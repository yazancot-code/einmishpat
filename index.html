<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עין משפט ונר מצוה</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'David', 'Frank Ruehl CLM', 'Times New Roman', serif;
      background: #edf3fb;
      color: #0d1f3c;
      min-height: 100vh;
      direction: rtl;
    }

    header {
      background: linear-gradient(160deg, #1a3a6b 0%, #0d2145 100%);
      color: #c8dff7;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      border-bottom: 4px solid #4a90d9;
      box-shadow: 0 3px 12px rgba(0,0,0,0.35);
    }
    header h1 {
      font-size: 2.2rem;
      letter-spacing: 0.03em;
      margin-bottom: 0.4rem;
    }
    header p {
      font-size: 1rem;
      opacity: 0.82;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.8rem 1.2rem;
    }

    /* ── Selector card ── */
    .card {
      background: #f5f9ff;
      border: 1.5px solid #7ab3e0;
      border-radius: 14px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 10px rgba(20,70,140,0.1);
    }

    .selector-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 1.4rem;
      align-items: flex-end;
    }

    .field { display: flex; flex-direction: column; gap: 0.3rem; }

    label {
      font-size: 0.82rem;
      font-weight: bold;
      color: #1a3a6b;
      letter-spacing: 0.02em;
    }

    select {
      padding: 0.48rem 0.7rem;
      border: 1.5px solid #5a9fd4;
      border-radius: 7px;
      background: #fff;
      font-family: inherit;
      font-size: 1rem;
      color: #0d1f3c;
      direction: rtl;
      appearance: auto;
    }
    select:focus {
      outline: none;
      border-color: #1a3a6b;
      box-shadow: 0 0 0 3px rgba(26,58,107,0.18);
    }

    /* ── Jump buttons ── */
    .side-nav {
      display: flex;
      gap: 0.4rem;
      align-items: flex-end;
    }
    .side-btn {
      padding: 0.45rem 0.75rem;
      background: linear-gradient(135deg, #1a3a6b 0%, #2e5fa3 100%);
      color: #c8dff7;
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: bold;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .side-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }

    /* ── States ── */
    .loading-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: #1a3a6b;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid #a8ccee;
      border-top-color: #1a3a6b;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fff0f0;
      border: 1.5px solid #e09090;
      border-radius: 10px;
      padding: 1.1rem 1.4rem;
      color: #b00;
      text-align: center;
    }

    .empty-msg {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #5a7ea8;
      font-size: 1.05rem;
    }

    /* ── Side section ── */
    .side-section { margin-bottom: 2.2rem; scroll-margin-top: 1rem; }

    /* ── Results ── */
    .results-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #0d2145;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #4a90d9;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .results-title .daf-badge {
      background: #1a3a6b;
      color: #c8dff7;
      padding: 0.15rem 0.65rem;
      border-radius: 20px;
      font-size: 1rem;
    }

    .entries { display: flex; flex-direction: column; gap: 0.9rem; }

    .entry {
      background: #f5f9ff;
      border: 1px solid #90bce0;
      border-radius: 11px;
      overflow: hidden;
      box-shadow: 0 1px 5px rgba(20,70,140,0.08);
    }

    .entry-head {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1.1rem;
      background: #deeaf8;
      border-bottom: 1px solid #a8ccee;
    }
    .entry-letter {
      width: 30px; height: 30px;
      background: #1a3a6b;
      color: #c8dff7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.88rem;
      font-weight: bold;
      flex-shrink: 0;
    }
    .entry-dm {
      font-size: 0.82rem;
      color: #2e5fa3;
    }

    .entry-body { padding: 0.8rem 1.1rem; display: flex; flex-direction: column; gap: 0.55rem; }

    /* ── Rambam ref card ── */
    .rambam-ref {
      background: #e8f2fc;
      border: 1px solid #7ab3e0;
      border-radius: 8px;
      overflow: hidden;
    }

    /* ── Shulchan Aruch ref card ── */
    .sa-ref {
      background: #f0f7ee;
      border: 1px solid #7abf8e;
      border-radius: 8px;
      overflow: hidden;
    }
    .sa-ref .halacha-box { border-right-color: #2d7a4a; }

    .ref-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      padding: 0.55rem 0.9rem;
      flex-wrap: wrap;
    }
    .ref-title {
      font-weight: bold;
      font-size: 0.97rem;
      color: #0d2145;
      flex: 1;
    }
    .ref-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .link-ws {
      font-size: 0.78rem;
      color: #1a3a6b;
      text-decoration: none;
      padding: 0.2rem 0.5rem;
      border: 1px solid #7ab3e0;
      border-radius: 4px;
      white-space: nowrap;
    }
    .link-ws:hover { background: #c0daef; }

    .halacha-box {
      display: block;
      padding: 0.8rem 1rem;
      background: #fafdff;
      border-top: 1px solid #a8ccee;
      font-size: 1rem;
      line-height: 1.8;
      color: #0d1f3c;
      border-right: 4px solid #1a3a6b;
      white-space: pre-wrap;
    }
    .halacha-box.loading { color: #7a9fc0; font-style: italic; }

    /* ── Other sources note ── */
    .other-sources {
      font-size: 0.8rem;
      color: #4a7aaa;
      padding: 0 0.9rem 0.6rem;
    }

    @media (max-width: 560px) {
      header h1 { font-size: 1.6rem; }
      .selector-row { gap: 0.7rem; }
      .ref-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <h1>עין משפט ונר מצוה</h1>
  <p>בחר דף גמרא וקבל את הלכות הרמב"ם המקושרות</p>
</header>

<main>
  <div class="card">
    <div class="selector-row">
      <div class="field">
        <label for="tractate">מסכת</label>
        <select id="tractate" onchange="onTractateChange()"></select>
      </div>
      <div class="field">
        <label for="daf-num">דף</label>
        <select id="daf-num" onchange="doSearch()"></select>
      </div>
      <div class="side-nav" id="side-nav" style="display:none">
        <button class="side-btn" onclick="jumpTo('side-aleph')">עמוד א</button>
        <button class="side-btn" onclick="jumpTo('side-bet')">עמוד ב</button>
      </div>
    </div>
  </div>

  <div id="results"></div>
</main>

<script>
const API = 'https://he.wikisource.org/w/api.php';

const TRACTATES = [
  'ברכות',
  'שבת','עירובין','פסחים','יומא','סוכה','ביצה',
  'ראש השנה','תענית','מגילה','מועד קטן','חגיגה',
  'יבמות','כתובות','נדרים','נזיר','סוטה','גיטין','קידושין',
  'בבא קמא','בבא מציעא','בבא בתרא','סנהדרין','מכות',
  'שבועות','עבודה זרה','הוריות',
  'זבחים','מנחות','חולין','בכורות','ערכין','תמורה',
  'כריתות','מעילה','תמיד','נדה'
];

// Last daf number for each tractate
const DAF_MAX = {
  'ברכות':64,'שבת':157,'עירובין':105,'פסחים':121,'יומא':88,
  'סוכה':56,'ביצה':40,'ראש השנה':35,'תענית':31,'מגילה':32,
  'מועד קטן':29,'חגיגה':27,'יבמות':122,'כתובות':112,'נדרים':91,
  'נזיר':66,'סוטה':49,'גיטין':90,'קידושין':82,'בבא קמא':119,
  'בבא מציעא':119,'בבא בתרא':176,'סנהדרין':113,'מכות':24,
  'שבועות':49,'עבודה זרה':76,'הוריות':14,'זבחים':120,'מנחות':110,
  'חולין':142,'בכורות':61,'ערכין':34,'תמורה':34,'כריתות':28,
  'מעילה':22,'תמיד':33,'נדה':73
};

// ── Hebrew numerals ──────────────────────────────────────────
function toHebrewNum(n) {
  if (n <= 0) return '';
  const ONES = ['','א','ב','ג','ד','ה','ו','ז','ח','ט'];
  const TENS = ['','י','כ','ל','מ','נ','ס','ע','פ','צ'];
  const HUNDREDS = ['','ק','ר','ש','ת','תק','תר','תש','תת','תתק'];
  let r = '';
  if (n >= 100) { r += HUNDREDS[Math.floor(n/100)]; n %= 100; }
  if (n === 15) return r + 'טו';
  if (n === 16) return r + 'טז';
  if (n >= 10) { r += TENS[Math.floor(n/10)]; n %= 10; }
  return r + ONES[n];
}

// ── Populate tractate dropdown ───────────────────────────────
const tractSel = document.getElementById('tractate');
TRACTATES.forEach(t => {
  const o = document.createElement('option');
  o.value = o.textContent = t;
  tractSel.appendChild(o);
});

// ── Build daf dropdown for a given tractate ──────────────────
function buildDafDropdown(tractate) {
  const max = DAF_MAX[tractate] || 64;
  const dafSel = document.getElementById('daf-num');
  dafSel.innerHTML = '';
  for (let i = 2; i <= max; i++) {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = toHebrewNum(i);
    dafSel.appendChild(o);
  }
}

function onTractateChange() {
  buildDafDropdown(document.getElementById('tractate').value);
  doSearch();
}

// Initialize daf dropdown for first tractate
buildDafDropdown(TRACTATES[0]);

// ── Jump to section ──────────────────────────────────────────
function jumpTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth' });
}

// ── API helpers ──────────────────────────────────────────────
async function apiGet(params) {
  const url = new URL(API);
  url.searchParams.set('origin', '*');
  url.searchParams.set('format', 'json');
  url.searchParams.set('formatversion', '2');
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function apiPost(params) {
  const body = new FormData();
  body.append('origin', '*');
  body.append('format', 'json');
  body.append('formatversion', '2');
  for (const [k, v] of Object.entries(params)) body.append(k, v);
  const r = await fetch(API, { method: 'POST', body });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function fetchWikitext(title) {
  const d = await apiGet({ action:'query', titles:title, prop:'revisions', rvprop:'content', rvslots:'main' });
  const pg = d.query.pages[0];
  if (pg.missing) return null;
  return pg.revisions[0].slots.main.content;
}

// ── Extract Ein Mishpat entries from rendered HTML ───────────
function extractEntries(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const entries = [];

  for (const p of doc.querySelectorAll('p')) {
    const bigB = p.querySelector('big b');
    const letter = bigB ? bigB.textContent.trim() : null;

    const links = Array.from(p.querySelectorAll('a'));
    const rambamLinks = links.filter(a => {
      const h = a.getAttribute('href') || '';
      return h.includes('%D7%94%D7%9C%D7%9B%D7%95%D7%AA') &&
             (h.includes('%D7%A8%D7%9E%D7%91') || h.includes('רמב'));
    });
    const saLinks = links.filter(a => {
      const h = a.getAttribute('href') || '';
      return h.includes('%D7%A9%D7%95%D7%9C%D7%97%D7%9F_%D7%A2%D7%A8%D7%95%D7%9A') ||
             h.includes('שולחן_ערוך');
    });

    if (!rambamLinks.length && !saLinks.length) continue;

    const seen = new Set();
    const refs = [];

    function addRefs(linkList, type) {
      const sorted = [...linkList].sort((a, b) =>
        (b.getAttribute('href') || '').length - (a.getAttribute('href') || '').length
      );
      for (const a of sorted) {
        const href = a.getAttribute('href');
        const rawTitle = a.getAttribute('title') || decodeURIComponent(href.replace('/wiki/', '')).replace(/_/g, ' ');
        const alreadyCovered = refs.some(r => r.rawTitle.startsWith(rawTitle) && r.rawTitle !== rawTitle);
        if (alreadyCovered) continue;
        if (seen.has(rawTitle)) continue;
        seen.add(rawTitle);
        refs.push({ rawTitle, linkText: a.textContent.trim(), wsUrl: 'https://he.wikisource.org' + href, type });
      }
    }
    addRefs(rambamLinks, 'rambam');
    addRefs(saLinks, 'sa');

    const sourceLinks = [...rambamLinks, ...saLinks];
    const otherText = links
      .filter(a => !sourceLinks.includes(a))
      .map(a => a.textContent.trim())
      .filter(Boolean)
      .join('، ');

    entries.push({ letter, refs, otherText });
  }
  return entries;
}

// ── Fetch entries for one side ───────────────────────────────
async function fetchSide(tractate, dafHeb, side) {
  const dafPage = `${tractate} ${dafHeb} ${side}`;
  const dafWT = await fetchWikitext(dafPage);
  if (!dafWT) return { side, dafPage, entries: null };

  const matches = [...dafWT.matchAll(/\{\{קטע עם כותרת\|([^|]+)\|([^}]+)\}\}/g)];
  const einRefs = matches
    .filter(m => m[1].includes('עין משפט'))
    .map(m => ({ chapterPage: m[1].trim(), sectionId: m[2].trim() }));

  if (!einRefs.length) return { side, dafPage, entries: [] };

  const allEntries = [];
  for (const { chapterPage, sectionId } of einRefs) {
    const cpWT = await fetchWikitext(chapterPage);
    if (!cpWT) continue;

    const escId = sectionId.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`<קטע התחלה=${escId}\\/>([\\s\\S]*?)<קטע סוף=${escId}\\/>`, 'g');
    const sm = re.exec(cpWT);
    if (!sm) continue;

    const parsed = await apiPost({
      action: 'parse', text: sm[1], title: chapterPage,
      contentmodel: 'wikitext', prop: 'text',
      disablelimitreport: '1', disableeditsection: '1'
    });

    const entries = extractEntries(parsed.parse?.text || '');
    allEntries.push(...entries);
  }

  return { side, dafPage, entries: allEntries };
}

// ── Parse title into display label ──────────────────────────
function parseRambamTitle(rawTitle) {
  const m = rawTitle.match(/הלכות\s+(.+)/);
  if (!m) return rawTitle;
  const rest = m[1].trim();
  const parts = rest.split(/\s+/);
  const isHebLetter = s => /^[א-ת"]+$/.test(s) && s.length <= 4;

  let hilchot, chapter, halacha;
  if (parts.length >= 3 && isHebLetter(parts[parts.length - 1]) && isHebLetter(parts[parts.length - 2])) {
    halacha = parts[parts.length - 1];
    chapter = parts[parts.length - 2];
    hilchot = parts.slice(0, -2).join(' ');
  } else if (parts.length >= 2 && isHebLetter(parts[parts.length - 1])) {
    chapter = parts[parts.length - 1];
    hilchot = parts.slice(0, -1).join(' ');
    halacha = null;
  } else {
    hilchot = rest; chapter = null; halacha = null;
  }

  let label = 'רמב"ם הלכות ' + hilchot;
  if (chapter) label += ', פרק ' + chapter;
  if (halacha) label += ', הלכה ' + halacha;
  return label;
}

// ── Parse Shulchan Aruch title ───────────────────────────────
function parseShulchanAruchTitle(rawTitle) {
  const sections = ['אורח חיים', 'יורה דעה', 'אבן העזר', 'חושן משפט'];
  for (const sec of sections) {
    if (rawTitle.includes(sec)) {
      const parts = rawTitle.split(sec)[1].trim().split(/\s+/).filter(Boolean);
      let label = 'שו"ע ' + sec;
      if (parts[0]) label += ' ' + parts[0];
      if (parts[1]) label += ':' + parts[1];
      return label;
    }
  }
  return rawTitle;
}

// ── Main search — fetches both sides ────────────────────────
let currentSearch = 0;

async function doSearch() {
  const tractate = document.getElementById('tractate').value;
  const dafNum   = parseInt(document.getElementById('daf-num').value, 10);
  if (!tractate || !dafNum) return;

  const searchId = ++currentSearch;
  const dafHeb = toHebrewNum(dafNum);

  document.getElementById('side-nav').style.display = 'none';
  showLoading(`טוען דף ${tractate} ${dafHeb}…`);

  try {
    const [resAleph, resBet] = await Promise.all([
      fetchSide(tractate, dafHeb, 'א'),
      fetchSide(tractate, dafHeb, 'ב')
    ]);

    if (searchId !== currentSearch) return; // stale

    renderBothSides(resAleph, resBet);
    document.getElementById('side-nav').style.display = 'flex';

  } catch (err) {
    if (searchId !== currentSearch) return;
    console.error(err);
    showError('שגיאה: ' + err.message);
  }
}

// ── Render both sides ────────────────────────────────────────
function renderBothSides(resAleph, resBet) {
  const toFetch = [];
  let html = '';

  for (const { side, dafPage, entries } of [
    { ...resAleph, anchorId: 'side-aleph' },
    { ...resBet,   anchorId: 'side-bet'   }
  ]) {
    const anchorId = side === 'א' ? 'side-aleph' : 'side-bet';
    html += `<div class="side-section" id="${anchorId}">`;
    html += `<div class="results-title">עמוד ${esc(side)} &nbsp;–&nbsp; <span class="daf-badge">${esc(dafPage)}</span></div>`;

    if (entries === null) {
      html += `<div class="error-box">הדף "${esc(dafPage)}" לא נמצא בויקיטקסט</div>`;
    } else if (entries.length === 0) {
      html += `<div class="empty-msg">לא נמצאו הלכות רמב"ם או שו"ע לעמוד זה</div>`;
    } else {
      html += `<div class="entries">`;
      entries.forEach((entry, ei) => {
        html += `<div class="entry">
          <div class="entry-head">
            <div class="entry-letter">${esc(entry.letter || toHebrewNum(ei + 1))}</div>
          </div>
          <div class="entry-body">`;

        entry.refs.forEach((ref, ri) => {
          const boxId = `hbox-${side}-${ei}-${ri}`;
          const isRambam = ref.type !== 'sa';
          const refClass = isRambam ? 'rambam-ref' : 'sa-ref';
          const icon     = isRambam ? '📖' : '⚖️';
          const label    = isRambam ? parseRambamTitle(ref.rawTitle) : parseShulchanAruchTitle(ref.rawTitle);
          toFetch.push({ boxId, rawTitle: ref.rawTitle });
          html += `<div class="${refClass}">
            <div class="ref-header">
              <div class="ref-title">${icon} ${esc(label)}</div>
            </div>
            <div class="halacha-box loading" id="${boxId}">טוען…</div>
          </div>`;
        });

        html += `</div>`;
        if (entry.otherText) {
          html += `<div class="other-sources">מקורות נוספים: ${esc(entry.otherText)}</div>`;
        }
        html += `</div>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  }

  document.getElementById('results').innerHTML = html;
  toFetch.forEach(({ boxId, rawTitle }) => loadHalacha(boxId, rawTitle));
}

// ── Fetch and display a single halacha into its box ─────────
async function loadHalacha(boxId, rawTitle) {
  const box = document.getElementById(boxId);
  if (!box) return;
  try {
    const d = await apiGet({
      action: 'parse', page: rawTitle, prop: 'text',
      disablelimitreport: '1', disableeditsection: '1'
    });

    const html = d.parse?.text || '';
    const doc = new DOMParser().parseFromString(html, 'text/html');
    doc.querySelectorAll('.mw-editsection, [class*="editsection"]').forEach(el => el.remove());
    doc.querySelectorAll('a').forEach(el => { if (el.textContent.trim() === 'עריכה') el.remove(); });
    doc.querySelectorAll('sup, .reference, .mw-ref').forEach(el => el.remove());

    const dafusHeading = Array.from(doc.querySelectorAll('h3'))
      .find(h => h.textContent.trim() === 'דפוס');
    let text = '';
    if (dafusHeading) {
      const wrapper = dafusHeading.closest('.mw-heading') || dafusHeading.parentElement;
      let el = wrapper.nextElementSibling;
      const chunks = [];
      while (el) {
        if (el.classList.contains('mw-heading') || /^H[2-4]$/.test(el.tagName)) break;
        const t = el.textContent.trim();
        if (t) chunks.push(t);
        el = el.nextElementSibling;
      }
      text = chunks.join('\n\n');
    }

    // helper: collect <p> text from el and nested children, skip empty
    function collectP(el) {
      const nodes = el.tagName === 'P' ? [el] : Array.from(el.querySelectorAll('p'));
      return nodes.map(p => p.textContent.trim()).filter(Boolean);
    }

    // SA Case 1: seif-specific page — single h2 "שולחן ערוך", stop at first commentary heading
    if (!text) {
      const saH2 = Array.from(doc.querySelectorAll('h2'))
        .find(h => h.textContent.trim() === 'שולחן ערוך');
      if (saH2) {
        const wrapper = saH2.closest('.mw-heading') || saH2;
        let el = wrapper.nextElementSibling;
        const chunks = [];
        while (el) {
          if (el.classList.contains('mw-heading') || /^H[1-4]$/.test(el.tagName)) break;
          chunks.push(...collectP(el));
          el = el.nextElementSibling;
        }
        text = chunks.join('\n');
      }
    }

    // SA Case 2: siman page — multiple h2 "סעיף א/ב/..." headings
    if (!text) {
      const seifHeadings = Array.from(doc.querySelectorAll('h2'))
        .filter(h => h.textContent.trim().startsWith('סעיף'));
      if (seifHeadings.length) {
        const chunks = [];
        for (const h of seifHeadings) {
          const wrapper = h.closest('.mw-heading') || h;
          let el = wrapper.nextElementSibling;
          const seifText = [];
          while (el) {
            if (el.classList.contains('mw-heading') || /^H[1-4]$/.test(el.tagName)) break;
            seifText.push(...collectP(el));
            el = el.nextElementSibling;
          }
          if (seifText.length) chunks.push(h.textContent.trim() + '\n' + seifText.join('\n'));
        }
        text = chunks.join('\n\n');
      }
    }
    box.className = 'halacha-box';
    box.textContent = text || 'לא נמצא טקסט';
  } catch {
    box.className = 'halacha-box';
    box.textContent = 'שגיאה בטעינת ההלכה';
  }
}

// ── Display helpers ──────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('results').innerHTML =
    `<div class="loading-msg"><div class="spinner"></div>${esc(msg)}</div>`;
}
function showError(msg) {
  document.getElementById('results').innerHTML =
    `<div class="error-box">${esc(msg)}</div>`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Auto-load on startup
doSearch();
</script>
