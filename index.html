<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עין משפט ונר מצוה</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'David', 'Frank Ruehl CLM', 'Times New Roman', serif;
      background: #edf3fb;
      color: #0d1f3c;
      min-height: 100vh;
      direction: rtl;
    }

    header {
      background: linear-gradient(160deg, #1a3a6b 0%, #0d2145 100%);
      color: #c8dff7;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      border-bottom: 4px solid #4a90d9;
      box-shadow: 0 3px 12px rgba(0,0,0,0.35);
    }
    header h1 {
      font-size: 2.2rem;
      letter-spacing: 0.03em;
      margin-bottom: 0.4rem;
    }
    header p {
      font-size: 1rem;
      opacity: 0.82;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.8rem 1.2rem;
    }

    /* ── Selector card ── */
    .card {
      background: #f5f9ff;
      border: 1.5px solid #7ab3e0;
      border-radius: 14px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1.8rem;
      box-shadow: 0 2px 10px rgba(20,70,140,0.1);
    }

    .selector-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 1.4rem;
      align-items: flex-end;
    }

    .field { display: flex; flex-direction: column; gap: 0.3rem; }

    label {
      font-size: 0.82rem;
      font-weight: bold;
      color: #1a3a6b;
      letter-spacing: 0.02em;
    }

    select, input[type="number"] {
      padding: 0.48rem 0.7rem;
      border: 1.5px solid #5a9fd4;
      border-radius: 7px;
      background: #fff;
      font-family: inherit;
      font-size: 1rem;
      color: #0d1f3c;
      direction: rtl;
      appearance: auto;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #1a3a6b;
      box-shadow: 0 0 0 3px rgba(26,58,107,0.18);
    }
    #daf-num { width: 72px; }

    .btn-search {
      padding: 0.52rem 1.8rem;
      background: linear-gradient(135deg, #1a3a6b 0%, #2e5fa3 100%);
      color: #c8dff7;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-search:hover:not(:disabled) {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }
    .btn-search:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── States ── */
    .loading-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: #1a3a6b;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid #a8ccee;
      border-top-color: #1a3a6b;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fff0f0;
      border: 1.5px solid #e09090;
      border-radius: 10px;
      padding: 1.1rem 1.4rem;
      color: #b00;
      text-align: center;
    }

    .empty-msg {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #5a7ea8;
      font-size: 1.05rem;
    }

    /* ── Results ── */
    .results-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #0d2145;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #4a90d9;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .results-title .daf-badge {
      background: #1a3a6b;
      color: #c8dff7;
      padding: 0.15rem 0.65rem;
      border-radius: 20px;
      font-size: 1rem;
    }

    .entries { display: flex; flex-direction: column; gap: 0.9rem; }

    .entry {
      background: #f5f9ff;
      border: 1px solid #90bce0;
      border-radius: 11px;
      overflow: hidden;
      box-shadow: 0 1px 5px rgba(20,70,140,0.08);
    }

    .entry-head {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1.1rem;
      background: #deeaf8;
      border-bottom: 1px solid #a8ccee;
    }
    .entry-letter {
      width: 30px; height: 30px;
      background: #1a3a6b;
      color: #c8dff7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.88rem;
      font-weight: bold;
      flex-shrink: 0;
    }
    .entry-dm {
      font-size: 0.82rem;
      color: #2e5fa3;
    }

    .entry-body { padding: 0.8rem 1.1rem; display: flex; flex-direction: column; gap: 0.55rem; }

    /* ── Rambam ref card ── */
    .rambam-ref {
      background: #e8f2fc;
      border: 1px solid #7ab3e0;
      border-radius: 8px;
      overflow: hidden;
    }

    .ref-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      padding: 0.55rem 0.9rem;
      flex-wrap: wrap;
    }
    .ref-title {
      font-weight: bold;
      font-size: 0.97rem;
      color: #0d2145;
      flex: 1;
    }
    .ref-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .link-ws {
      font-size: 0.78rem;
      color: #1a3a6b;
      text-decoration: none;
      padding: 0.2rem 0.5rem;
      border: 1px solid #7ab3e0;
      border-radius: 4px;
      white-space: nowrap;
    }
    .link-ws:hover { background: #c0daef; }

    .halacha-box {
      display: block;
      padding: 0.8rem 1rem;
      background: #fafdff;
      border-top: 1px solid #a8ccee;
      font-size: 1rem;
      line-height: 1.8;
      color: #0d1f3c;
      border-right: 4px solid #1a3a6b;
      white-space: pre-wrap;
    }
    .halacha-box.loading { color: #7a9fc0; font-style: italic; }

    /* ── Other sources note ── */
    .other-sources {
      font-size: 0.8rem;
      color: #4a7aaa;
      padding: 0 0.9rem 0.6rem;
    }

    @media (max-width: 560px) {
      header h1 { font-size: 1.6rem; }
      .selector-row { gap: 0.7rem; }
      .ref-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <h1>עין משפט ונר מצוה</h1>
  <p>בחר דף גמרא וקבל את הלכות הרמב"ם המקושרות</p>
</header>

<main>
  <div class="card">
    <div class="selector-row">
      <div class="field">
        <label for="tractate">מסכת</label>
        <select id="tractate"></select>
      </div>
      <div class="field">
        <label for="daf-num">דף</label>
        <input type="number" id="daf-num" min="2" max="200" value="2">
      </div>
      <div class="field">
        <label for="daf-side">עמוד</label>
        <select id="daf-side">
          <option value="א">א</option>
          <option value="ב">ב</option>
        </select>
      </div>
      <div class="field" style="justify-content:flex-end">
        <button class="btn-search" id="btn-search" onclick="doSearch()">חפש הלכות</button>
      </div>
    </div>
  </div>

  <div id="results"></div>
</main>

<script>
const API = 'https://he.wikisource.org/w/api.php';

const TRACTATES = [
  'ברכות',
  'שבת','עירובין','פסחים','יומא','סוכה','ביצה',
  'ראש השנה','תענית','מגילה','מועד קטן','חגיגה',
  'יבמות','כתובות','נדרים','נזיר','סוטה','גיטין','קידושין',
  'בבא קמא','בבא מציעא','בבא בתרא','סנהדרין','מכות',
  'שבועות','עבודה זרה','הוריות',
  'זבחים','מנחות','חולין','בכורות','ערכין','תמורה',
  'כריתות','מעילה','תמיד','נדה'
];

// Populate tractate dropdown
const sel = document.getElementById('tractate');
TRACTATES.forEach(t => {
  const o = document.createElement('option');
  o.value = o.textContent = t;
  sel.appendChild(o);
});

// ── Hebrew numerals ──────────────────────────────────────────
function toHebrewNum(n) {
  if (n <= 0) return '';
  const ONES = ['','א','ב','ג','ד','ה','ו','ז','ח','ט'];
  const TENS = ['','י','כ','ל','מ','נ','ס','ע','פ','צ'];
  const HUNDREDS = ['','ק','ר','ש','ת','תק','תר','תש','תת','תתק'];
  let r = '';
  if (n >= 100) { r += HUNDREDS[Math.floor(n/100)]; n %= 100; }
  if (n === 15) return r + 'טו';
  if (n === 16) return r + 'טז';
  if (n >= 10) { r += TENS[Math.floor(n/10)]; n %= 10; }
  return r + ONES[n];
}

// ── API helpers ──────────────────────────────────────────────
async function apiGet(params) {
  const url = new URL(API);
  url.searchParams.set('origin', '*');
  url.searchParams.set('format', 'json');
  url.searchParams.set('formatversion', '2');
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function apiPost(params) {
  const body = new FormData();
  body.append('origin', '*');
  body.append('format', 'json');
  body.append('formatversion', '2');
  for (const [k, v] of Object.entries(params)) body.append(k, v);
  const r = await fetch(API, { method: 'POST', body });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function fetchWikitext(title) {
  const d = await apiGet({ action:'query', titles:title, prop:'revisions', rvprop:'content', rvslots:'main' });
  const pg = d.query.pages[0];
  if (pg.missing) return null;
  return pg.revisions[0].slots.main.content;
}

// ── Extract Ein Mishpat entries from rendered HTML ───────────
function extractEntries(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const entries = [];

  for (const p of doc.querySelectorAll('p')) {
    // Entry letter: <big><b>X</b></big>
    const bigB = p.querySelector('big b');
    const letter = bigB ? bigB.textContent.trim() : null;

    // All links in paragraph
    const links = Array.from(p.querySelectorAll('a'));

    // Rambam links: href contains רמב (encoded: %D7%A8%D7%9E%D7%91) and הלכות (%D7%94%D7%9C%D7%9B%D7%95%D7%AA)
    const rambamLinks = links.filter(a => {
      const h = a.getAttribute('href') || '';
      return h.includes('%D7%94%D7%9C%D7%9B%D7%95%D7%AA') &&
             (h.includes('%D7%A8%D7%9E%D7%91') || h.includes('רמב'));
    });

    if (!rambamLinks.length) continue;

    // Deduplicate: prefer more-specific (longer) over prefix versions
    const seen = new Set();
    const refs = [];
    // Sort descending by href length to process specific ones first
    const sorted = [...rambamLinks].sort((a, b) =>
      (b.getAttribute('href') || '').length - (a.getAttribute('href') || '').length
    );
    for (const a of sorted) {
      const href = a.getAttribute('href');
      const rawTitle = a.getAttribute('title') || decodeURIComponent(href.replace('/wiki/', '')).replace(/_/g, ' ');
      // Skip if a more-specific version of this title already added
      const alreadyCovered = refs.some(r => r.rawTitle.startsWith(rawTitle) && r.rawTitle !== rawTitle);
      if (alreadyCovered) continue;
      if (seen.has(rawTitle)) continue;
      seen.add(rawTitle);
      refs.push({
        rawTitle,
        linkText: a.textContent.trim(),
        wsUrl: 'https://he.wikisource.org' + href
      });
    }

    // Other sources text (non-Rambam visible content)
    const otherText = links
      .filter(a => !rambamLinks.includes(a))
      .map(a => a.textContent.trim())
      .filter(Boolean)
      .join('، ');

    entries.push({ letter, refs, otherText });
  }
  return entries;
}

// ── Parse title into display label ──────────────────────────
// Title format: "רמב"ם הלכות X פרק-num הלכה-num"
// e.g. "רמב"ם הלכות קריאת שמע א ט"
function parseRambamTitle(rawTitle) {
  // rawTitle might be: "רמב"ם הלכות קריאת שמע א" or "רמב"ם הלכות קריאת שמע א ט"
  const m = rawTitle.match(/הלכות\s+(.+)/);
  if (!m) return rawTitle;
  const rest = m[1].trim(); // e.g. "קריאת שמע א ט"
  const parts = rest.split(/\s+/);
  // last 1-2 parts might be Hebrew letters (chapter/halacha)
  // heuristic: if last part is 1-3 chars and all Hebrew letters, it's halacha
  const isHebLetter = s => /^[א-ת"]+$/.test(s) && s.length <= 4;

  let hilchot, chapter, halacha;
  if (parts.length >= 3 && isHebLetter(parts[parts.length - 1]) && isHebLetter(parts[parts.length - 2])) {
    halacha = parts[parts.length - 1];
    chapter = parts[parts.length - 2];
    hilchot = parts.slice(0, -2).join(' ');
  } else if (parts.length >= 2 && isHebLetter(parts[parts.length - 1])) {
    chapter = parts[parts.length - 1];
    hilchot = parts.slice(0, -1).join(' ');
    halacha = null;
  } else {
    hilchot = rest;
    chapter = null;
    halacha = null;
  }

  let label = 'הלכות ' + hilchot;
  if (chapter) label += ', פרק ' + chapter;
  if (halacha) label += ', הלכה ' + halacha;
  return label;
}

// ── Main search ──────────────────────────────────────────────
async function doSearch() {
  const tractate = document.getElementById('tractate').value;
  const dafNum = parseInt(document.getElementById('daf-num').value, 10);
  const dafSide = document.getElementById('daf-side').value;

  if (!dafNum || dafNum < 2) { showError('מספר הדף חייב להיות לפחות 2'); return; }

  const dafHeb = toHebrewNum(dafNum);
  const dafPage = `${tractate} ${dafHeb} ${dafSide}`;

  const btn = document.getElementById('btn-search');
  btn.disabled = true;
  showLoading(`מחפש עין משפט לדף ${dafPage}…`);

  try {
    // 1. Fetch daf page wikitext
    const dafWT = await fetchWikitext(dafPage);
    if (!dafWT) { showError(`הדף "${dafPage}" לא נמצא בויקיטקסט`); return; }

    // 2. Find עין משפט chapter-page references
    const matches = [...dafWT.matchAll(/\{\{קטע עם כותרת\|([^|]+)\|([^}]+)\}\}/g)];
    const einRefs = matches
      .filter(m => m[1].includes('עין משפט'))
      .map(m => ({ chapterPage: m[1].trim(), sectionId: m[2].trim() }));

    if (!einRefs.length) { showError('לא נמצא עין משפט לדף זה'); return; }

    // 3. For each chapter page, fetch wikitext and extract the section
    const allEntries = [];
    for (const { chapterPage, sectionId } of einRefs) {
      showLoading(`טוען ${chapterPage}…`);
      const cpWT = await fetchWikitext(chapterPage);
      if (!cpWT) continue;

      // Extract section between <קטע התחלה=X/> and <קטע סוף=X/>
      const esc = sectionId.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp(`<קטע התחלה=${esc}\\/>([\\s\\S]*?)<קטע סוף=${esc}\\/>`, 'g');
      const sm = re.exec(cpWT);
      if (!sm) continue;

      // 4. Render section wikitext via API
      showLoading('מעבד הלכות…');
      const parsed = await apiPost({
        action: 'parse',
        text: sm[1],
        title: chapterPage,
        contentmodel: 'wikitext',
        prop: 'text',
        disablelimitreport: '1',
        disableeditsection: '1'
      });

      const html = parsed.parse?.text || '';
      const entries = extractEntries(html);
      allEntries.push(...entries);
    }

    if (!allEntries.length) { showEmpty(dafPage); return; }
    renderResults(allEntries, dafPage);

  } catch (err) {
    console.error(err);
    showError('שגיאה: ' + err.message);
  } finally {
    btn.disabled = false;
  }
}

// ── Fetch and display a single halacha into its box ─────────
async function loadHalacha(boxId, rawTitle) {
  const box = document.getElementById(boxId);
  if (!box) return;
  try {
    const d = await apiGet({
      action: 'parse',
      page: rawTitle,
      prop: 'text',
      disablelimitreport: '1',
      disableeditsection: '1'
    });

    const html = d.parse?.text || '';
    const doc = new DOMParser().parseFromString(html, 'text/html');

    // Find h3 whose text is "דפוס" (match by text content, not id, to avoid encoding issues)
    const dafusHeading = Array.from(doc.querySelectorAll('h3'))
      .find(h => h.textContent.trim() === 'דפוס');
    let text = '';
    if (dafusHeading) {
      // The h3 is inside <div class="mw-heading">; we need that div's next siblings
      const wrapper = dafusHeading.closest('.mw-heading') || dafusHeading.parentElement;
      let el = wrapper.nextElementSibling;
      const chunks = [];
      while (el) {
        // Stop at the next heading wrapper or bare heading tag
        if (el.classList.contains('mw-heading') || /^H[2-4]$/.test(el.tagName)) break;
        const t = el.textContent.trim();
        if (t) chunks.push(t);
        el = el.nextElementSibling;
      }
      text = chunks.join('\n\n');
    }

    box.className = 'halacha-box';
    box.textContent = text || 'לא נמצא טקסט דפוס';
  } catch {
    box.className = 'halacha-box';
    box.textContent = 'שגיאה בטעינת ההלכה';
  }
}

// ── Display helpers ──────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('results').innerHTML =
    `<div class="loading-msg"><div class="spinner"></div>${esc(msg)}</div>`;
}
function showError(msg) {
  document.getElementById('results').innerHTML =
    `<div class="error-box">${esc(msg)}</div>`;
}
function showEmpty(dafPage) {
  document.getElementById('results').innerHTML =
    `<div class="empty-msg">לא נמצאו הלכות רמב"ם עבור דף ${esc(dafPage)}</div>`;
}

function renderResults(entries, dafPage) {
  // Collect all (boxId, rawTitle) pairs to auto-fetch after DOM is ready
  const toFetch = [];

  let html = `<div class="results-title">
    הלכות רמב"ם &nbsp;–&nbsp;
    <span class="daf-badge">${esc(dafPage)}</span>
  </div>
  <div class="entries">`;

  entries.forEach((entry, ei) => {
    html += `<div class="entry">
      <div class="entry-head">
        <div class="entry-letter">${esc(entry.letter || toHebrewNum(ei + 1))}</div>
        <div class="entry-dm">ד"מ – עין משפט</div>
      </div>
      <div class="entry-body">`;

    entry.refs.forEach((ref, ri) => {
      const boxId = `hbox-${ei}-${ri}`;
      const label = parseRambamTitle(ref.rawTitle);
      toFetch.push({ boxId, rawTitle: ref.rawTitle });
      html += `<div class="rambam-ref">
        <div class="ref-header">
          <div class="ref-title">📖 ${esc(label)}</div>
          <div class="ref-actions">
            <a href="${esc(ref.wsUrl)}" target="_blank" rel="noopener" class="link-ws">ויקיטקסט ↗</a>
          </div>
        </div>
        <div class="halacha-box loading" id="${boxId}">טוען…</div>
      </div>`;
    });

    html += '</div>';
    if (entry.otherText) {
      html += `<div class="other-sources">מקורות נוספים: ${esc(entry.otherText)}</div>`;
    }
    html += '</div>';
  });

  html += '</div>';
  document.getElementById('results').innerHTML = html;

  // Fetch all halachot in parallel — DOM is ready at this point
  toFetch.forEach(({ boxId, rawTitle }) => loadHalacha(boxId, rawTitle));
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
