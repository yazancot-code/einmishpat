<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עין משפט ונר מצוה</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'David', 'Frank Ruehl CLM', 'Times New Roman', serif;
      background: #edf3fb;
      color: #0d1f3c;
      min-height: 100vh;
      direction: rtl;
    }

    header {
      background: linear-gradient(160deg, #1a3a6b 0%, #0d2145 100%);
      color: #c8dff7;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      border-bottom: 4px solid #4a90d9;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.35);
    }

    header h1 {
      font-size: 2.2rem;
      letter-spacing: 0.03em;
      margin-bottom: 0.4rem;
    }

    header p {
      font-size: 1rem;
      opacity: 0.82;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.8rem 1.2rem;
    }

    .card {
      background: #f5f9ff;
      border: 1.5px solid #7ab3e0;
      border-radius: 14px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 10px rgba(20, 70, 140, 0.1);
    }

    .selector-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 1.4rem;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    label {
      font-size: 0.82rem;
      font-weight: bold;
      color: #1a3a6b;
      letter-spacing: 0.02em;
    }

    select {
      padding: 0.48rem 0.7rem;
      border: 1.5px solid #5a9fd4;
      border-radius: 7px;
      background: #fff;
      font-family: inherit;
      font-size: 1rem;
      color: #0d1f3c;
      direction: rtl;
      appearance: auto;
    }

    select:focus {
      outline: none;
      border-color: #1a3a6b;
      box-shadow: 0 0 0 3px rgba(26, 58, 107, 0.18);
    }

    .side-nav {
      display: flex;
      gap: 0.4rem;
      align-items: flex-end;
    }

    .side-btn {
      padding: 0.45rem 0.75rem;
      background: linear-gradient(135deg, #1a3a6b 0%, #2e5fa3 100%);
      color: #c8dff7;
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: bold;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .side-btn:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }

    .loading-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: #1a3a6b;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid #a8ccee;
      border-top-color: #1a3a6b;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-box {
      background: #fff0f0;
      border: 1.5px solid #e09090;
      border-radius: 10px;
      padding: 1.1rem 1.4rem;
      color: #b00;
      text-align: center;
    }

    .empty-msg {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #5a7ea8;
      font-size: 1.05rem;
    }

    .side-section {
      margin-bottom: 2.2rem;
      scroll-margin-top: 1rem;
    }

    .results-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #0d2145;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #4a90d9;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .results-title .daf-badge {
      background: #1a3a6b;
      color: #c8dff7;
      padding: 0.15rem 0.65rem;
      border-radius: 20px;
      font-size: 1rem;
    }

    .entries {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .entry {
      background: #f5f9ff;
      border: 1px solid #90bce0;
      border-radius: 11px;
      overflow: hidden;
      box-shadow: 0 1px 5px rgba(20, 70, 140, 0.08);
    }

    .entry-head {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1.1rem;
      background: #deeaf8;
      border-bottom: 1px solid #a8ccee;
    }

    .entry-letter {
      width: 30px;
      height: 30px;
      background: #1a3a6b;
      color: #c8dff7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.88rem;
      font-weight: bold;
      flex-shrink: 0;
    }

    .entry-body {
      padding: 0.8rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .halacha-box {
      display: block;
      padding: 0.8rem 1rem;
      background: #fafdff;
      border-top: 1px solid #a8ccee;
      font-size: 1rem;
      line-height: 1.8;
      color: #0d1f3c;
      border-right: 4px solid #1a3a6b;
      white-space: pre-wrap;
    }

    .link-ws {
      font-size: 0.78rem;
      color: #1a3a6b;
      text-decoration: none;
      padding: 0.2rem 0.5rem;
      border: 1px solid #7ab3e0;
      border-radius: 4px;
      white-space: nowrap;
      display: inline-block;
      margin-top: 0.3rem;
    }

    .link-ws:hover {
      background: #c0daef;
    }

    @media (max-width: 560px) {
      header h1 {
        font-size: 1.6rem;
      }

      .selector-row {
        gap: 0.7rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>עין משפט ונר מצוה</h1>
    <p>בחר דף גמרא וקבל את ההלכות המקושרות</p>
  </header>

  <main>
    <div class="card">
      <div class="selector-row">
        <div class="field">
          <label for="daf-num">דף</label>
          <select id="daf-num" onchange="doSearch()"></select>
        </div>
        <div class="side-nav" id="side-nav" style="display:none">
          <button class="side-btn" onclick="jumpTo('side-aleph')">עמוד א</button>
          <button class="side-btn" onclick="jumpTo('side-bet')">עמוד ב</button>
        </div>
      </div>
    </div>

    <div id="results"></div>
  </main>

  <script>
    // CSV data storage for נדה tractate
    let nidaCSVData = null;
    let csvLoading = false;

    const DAF_MAX = 73; // נדה has 73 pages

    // Hebrew numerals
    function toHebrewNum(n) {
      if (n <= 0) return '';
      const ONES = ['', 'א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ז', 'ח', 'ט'];
      const TENS = ['', 'י', 'כ', 'ל', 'מ', 'נ', 'ס', 'ע', 'פ', 'צ'];
      const HUNDREDS = ['', 'ק', 'ר', 'ש', 'ת', 'תק', 'תר', 'תש', 'תת', 'תתק'];
      let r = '';
      if (n >= 100) { r += HUNDREDS[Math.floor(n / 100)]; n %= 100; }
      if (n === 15) return r + 'טו';
      if (n === 16) return r + 'טז';
      if (n >= 10) { r += TENS[Math.floor(n / 10)]; n %= 10; }
      return r + ONES[n];
    }

    // Build daf dropdown
    function buildDafDropdown() {
      const dafSel = document.getElementById('daf-num');
      dafSel.innerHTML = '';
      for (let i = 2; i <= DAF_MAX; i++) {
        const o = document.createElement('option');
        o.value = i;
        o.textContent = toHebrewNum(i);
        dafSel.appendChild(o);
      }
    }

    // Jump to section
    function jumpTo(id) {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    }

    // Escape HTML
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Load CSV data
    async function loadNidaCSVData() {
      if (csvLoading || nidaCSVData !== null) return;

      csvLoading = true;
      try {
        const response = await fetch('ein_mishpat_niddah.csv');
        if (!response.ok) throw new Error('Failed to load CSV');
        const csvText = await response.text();
        nidaCSVData = parseCSV(csvText);
      } catch (err) {
        console.error('Error loading Nida CSV:', err);
        nidaCSVData = {};
      } finally {
        csvLoading = false;
      }
    }

    // Parse CSV into lookup structure: {daf-amud-entry_letter: {text, url}}
    function parseCSV(csvText) {
      const lines = csvText.trim().split('\n');
      if (lines.length < 2) return {};

      const headers = lines[0].split(',').map(h => h.trim());
      const data = {};

      for (let i = 1; i < lines.length; i++) {
        const match = lines[i].match(/(?:^|,)("(?:[^"]|"")*"|[^,]*)/g);
        if (!match) continue;

        const row = {};
        for (let j = 0; j < headers.length && j < match.length; j++) {
          let value = match[j].trim();
          if (value.startsWith('"') && value.endsWith('"')) {
            value = value.slice(1, -1).replace(/""/g, '"');
          }
          row[headers[j]] = value;
        }

        const key = `${row.daf}-${row.amud}-${row.entry_letter}`;
        data[key] = {
          text: row.text || '',
          url: row.url || ''
        };
      }

      return data;
    }

    // Main search
    let currentSearch = 0;

    async function doSearch() {
      const dafNum = parseInt(document.getElementById('daf-num').value, 10);
      if (!dafNum) return;

      const searchId = ++currentSearch;
      const dafHeb = toHebrewNum(dafNum);

      document.getElementById('side-nav').style.display = 'none';
      showLoading(`מטען נתונים עבור מסכת נידה דף ${dafHeb}…`);

      try {
        await loadNidaCSVData();

        if (searchId !== currentSearch) return;

        renderNidaSides(dafNum, dafHeb);
        document.getElementById('side-nav').style.display = 'flex';

      } catch (err) {
        if (searchId !== currentSearch) return;
        console.error(err);
        showError('שגיאה בטעינת נתוני נידה: ' + err.message);
      }
    }

    // Render both sides
    function renderNidaSides(dafNum, dafHeb) {
      let html = '';

      for (const side of ['a', 'b']) {
        const anchorId = side === 'a' ? 'side-aleph' : 'side-bet';
        const sideLabel = side === 'a' ? 'א' : 'ב';
        html += `<div class="side-section" id="${anchorId}">`;
        html += `<div class="results-title">עמוד ${sideLabel} &nbsp;–&nbsp; <span class="daf-badge">נידה ${dafHeb}</span></div>`;

        const keyPrefix = `${dafNum}-${side}`;
        const entriesForSide = [];

        // Find all entries for this daf and side
        for (const [key, data] of Object.entries(nidaCSVData || {})) {
          if (key.startsWith(keyPrefix)) {
            const entryLetter = key.split('-')[2];
            entriesForSide.push({
              entry_letter: entryLetter,
              text: data.text,
              url: data.url
            });
          }
        }

        // Sort by entry letter
        entriesForSide.sort((a, b) => {
          const getOrder = (letter) => {
            const hebrewNumMap = {
              'א': 1, 'ב': 2, 'ג': 3, 'ד': 4, 'ה': 5, 'ו': 6, 'ז': 7, 'ח': 8, 'ט': 9,
              'י': 10, 'כ': 20, 'ל': 30, 'מ': 40, 'נ': 50, 'ס': 60, 'ע': 70, 'פ': 80, 'צ': 90,
              'ק': 100, 'ר': 200, 'ש': 300, 'ת': 400
            };
            if (letter.length === 1) return hebrewNumMap[letter] || 0;
            if (letter.length === 2) {
              const tens = hebrewNumMap[letter[0]] || 0;
              const ones = hebrewNumMap[letter[1]] || 0;
              return tens + ones;
            }
            return 0;
          };
          return getOrder(a.entry_letter) - getOrder(b.entry_letter);
        });

        if (entriesForSide.length === 0) {
          html += `<div class="empty-msg">לא נמצאו נתונים לעמוד זה במסכת נידה</div>`;
        } else {
          html += `<div class="entries">`;
          entriesForSide.forEach((entry) => {
            const displayLetter = entry.entry_letter;

            html += `<div class="entry">
          <div class="entry-head">
            <div class="entry-letter">${esc(displayLetter)}</div>
          </div>
          <div class="entry-body">`;

            // Display text content
            if (entry.text) {
              const textLines = entry.text.split('\n').filter(line => line.trim() !== '');
              textLines.forEach((line, lineIndex) => {
                html += `<div class="halacha-box">${esc(line)}</div>`;
                if (lineIndex < textLines.length - 1) {
                  html += `<div style="margin: 0.3rem 0;"></div>`;
                }
              });
            }

            // Display URLs as links
            if (entry.url) {
              const urls = entry.url.split('\n').filter(url => url.trim() !== '');
              if (urls.length > 0) {
                html += `<div style="margin-top: 0.5rem;">`;
                urls.forEach((url, urlIndex) => {
                  if (urlIndex > 0) {
                    html += `<div style="margin-top: 0.2rem;"></div>`;
                  }
                  html += `<a href="${esc(url)}" target="_blank" class="link-ws">צפייה במקור${urls.length > 1 ? ` (${urlIndex + 1}/${urls.length})` : ''}</a>`;
                });
                html += `</div>`;
              }
            }

            html += `</div>`;
            html += `</div>`;
          });
          html += `</div>`;
        }

        html += `</div>`;
      }

      document.getElementById('results').innerHTML = html;
    }

    // Display helpers
    function showLoading(msg) {
      document.getElementById('results').innerHTML =
        `<div class="loading-msg"><div class="spinner"></div>${esc(msg)}</div>`;
    }

    function showError(msg) {
      document.getElementById('results').innerHTML =
        `<div class="error-box">${esc(msg)}</div>`;
    }

    // Initialize
    async function init() {
      buildDafDropdown();
      await loadNidaCSVData();
      doSearch();
    }

    init();
  </script>
</body>

</html>
